name: Build

on:
  push:
    branches: [ master, "feature/**" ] # master: build + publish nightly; feature/*: build only
  pull_request: # build only (no release) for all PR targets
  workflow_dispatch:

# The default GITHUB_TOKEN is read-only since 2023; publishing a release needs write.
permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:

  linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.2"
          modules: qtcharts
          cache: true

      - name: Install deploy dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 patchelf desktop-file-utils \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-shape0 libxkbcommon-x11-0

      - name: Build
        run: sh scripts/build_unix_github.sh

      - name: Deploy (directory / tar.gz)
        run: sh scripts/deploy_unix_dir.sh

      - name: Deploy AppImage
        run: sh scripts/deploy_unix.sh

      - name: Collect artifacts
        run: |
          mkdir -p out
          cp ./release/SupraFit.tar.gz out/SupraFit-nightly-x86_64-Linux.tar.gz
          cp ./release/bin/linux/SupraFit-nightly-x86_64.AppImage out/SupraFit-nightly-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: out/*
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Install Qt for MinGW plus a matching MinGW toolchain (added to PATH), so we don't
      # depend on the runner's chocolatey MinGW. tools_mingw1310 = MinGW 13.1.0 (Qt 6.8 default).
      - name: Install Qt + MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.2"
          arch: win64_mingw
          modules: qtcharts
          tools: tools_mingw1310
          add-tools-to-path: true
          cache: true

      - name: Build
        run: scripts/build_windows_x64_mingw.bat

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p out
          cp build_x64/bin/win/SupraFit.zip out/SupraFit-nightly-x86_64-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: out/*
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.2"
          modules: qtcharts
          cache: true

      - name: Build
        run: sh scripts/build_macOS_github.sh

      - name: Smoke test app launch and file dialog
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$PWD/release/bin/macOS/suprafit.app"
          BIN_PATH="$APP_PATH/Contents/MacOS/suprafit"
          test -d "$APP_PATH"
          test -x "$BIN_PATH"

          # Basic startup sanity: executable responds without GUI interaction.
          "$BIN_PATH" --help >/tmp/suprafit-help.txt 2>&1 || true
          head -n 20 /tmp/suprafit-help.txt || true

          APP_PROCESS="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Contents/Info.plist")"
          open -a "$APP_PATH"

          for _ in {1..30}; do
            if pgrep -x "$APP_PROCESS" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          pgrep -x "$APP_PROCESS" >/dev/null 2>&1
          /usr/bin/osascript -e "tell application \"System Events\" to tell process \"$APP_PROCESS\" to set frontmost to true"
          /usr/bin/osascript -e 'tell application "System Events" to keystroke "o" using command down'
          sleep 2

          DIALOG_STATE=$(/usr/bin/osascript <<EOF
          tell application "System Events"
            tell process "$APP_PROCESS"
              if ((count of sheets of windows) > 0) or ((count of windows) > 1) then
                return "ok"
              else
                return "missing"
              end if
            end tell
          end tell
          EOF
          )
          if [[ "$DIALOG_STATE" != "ok" ]]; then
            echo "Open dialog did not appear after Cmd+O."
            exit 1
          fi

          /usr/bin/osascript -e 'tell application "System Events" to key code 53' || true
          /usr/bin/osascript -e 'tell application "System Events" to keystroke "q" using command down' || true
          sleep 2
          pkill -x "$APP_PROCESS" || true

      - name: Verify app signing and macOS assessment
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$PWD/release/bin/macOS/suprafit.app"
          test -d "$APP_PATH"

          echo "codesign identity and metadata:"
          codesign -dvv "$APP_PATH"

          echo "codesign deep verification:"
          codesign --verify --deep --verbose=2 "$APP_PATH"

          echo "spctl assessment (informational in CI without notarization):"
          spctl -a -vv --type exec "$APP_PATH" || true

      - name: Collect artifact
        run: |
          mkdir -p out
          # macdeployqt names the dmg after the app (suprafit.app -> suprafit.dmg); glob to be case-safe.
          cp ./release/bin/macOS/*.dmg out/SupraFit-nightly-macOS.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: out/*
          if-no-files-found: error

  release:
    name: Publish prerelease
    runs-on: ubuntu-latest
    needs: [linux, windows, macos]
    # Publish whatever built (a single failing platform must not block the others) for real pushes /
    # manual runs — not pull requests. master publishes the shared `nightly`; a feature branch
    # publishes its own `ci-<branch>` prerelease so it never clobbers the master nightly.
    if: ${{ github.event_name != 'pull_request' && !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute release identity
        id: rel
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "name=SupraFit Nightly" >> "$GITHUB_OUTPUT"
          else
            slug="$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr -cd 'A-Za-z0-9._-')"
            echo "tag=ci-${slug}" >> "$GITHUB_OUTPUT"
            echo "name=SupraFit CI (${GITHUB_REF_NAME})" >> "$GITHUB_OUTPUT"
          fi

      - name: Move the release tag to this commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.rel.outputs.tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ steps.rel.outputs.tag }}" --force

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.name }}
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            dist/**/*.AppImage
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.dmg
          body: |
            Automated build (2.5.${{ github.run_number }}) from `${{ github.ref_name }}`.
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          append_body: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
