name: Build

on:
  push:
    branches: [ master ] # build all platforms + publish nightly prerelease
  pull_request:
    branches: [ master ] # build only (no release)
  workflow_dispatch:

# The default GITHUB_TOKEN is read-only since 2023; publishing a release needs write.
permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:

  linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          modules: qtcharts
          cache: true

      - name: Install deploy dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 patchelf desktop-file-utils \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-shape0 libxkbcommon-x11-0

      - name: Build
        run: sh scripts/build_unix_github.sh

      - name: Deploy (directory / tar.gz)
        run: sh scripts/deploy_unix_dir.sh

      - name: Deploy AppImage
        run: sh scripts/deploy_unix.sh

      - name: Collect artifacts
        run: |
          mkdir -p out
          cp ./release/SupraFit.tar.gz out/SupraFit-nightly-x86_64-Linux.tar.gz
          cp ./release/bin/linux/SupraFit-nightly-x86_64.AppImage out/SupraFit-nightly-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: out/*
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          arch: win64_mingw
          modules: qtcharts
          cache: true

      - name: Build
        run: scripts/build_windows_x64_mingw.bat

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p out
          cp build_x64/bin/win/SupraFit.zip out/SupraFit-nightly-x86_64-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: out/*
          if-no-files-found: error

  macos:
    runs-on: macos-13
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          modules: qtcharts
          cache: true

      - name: Build
        run: sh scripts/build_macOS_github.sh

      - name: Collect artifact
        run: |
          mkdir -p out
          # macdeployqt names the dmg after the app (suprafit.app -> suprafit.dmg); glob to be case-safe.
          cp ./release/bin/macOS/*.dmg out/SupraFit-nightly-macOS.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: out/*
          if-no-files-found: error

  release:
    name: Publish nightly prerelease
    runs-on: ubuntu-latest
    needs: [linux, windows, macos]
    # Publish whatever built (a single failing platform must not block the others),
    # but only for real pushes / manual runs — not pull requests.
    if: ${{ github.event_name != 'pull_request' && !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Move the nightly tag to this commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "${GITHUB_SHA}"
          git push origin refs/tags/nightly --force

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: SupraFit Nightly
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            dist/**/*.AppImage
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.dmg
          body: |
            Automated nightly build (2.5.${{ github.run_number }}).
            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          append_body: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
